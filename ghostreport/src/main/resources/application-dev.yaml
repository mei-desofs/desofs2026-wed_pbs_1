spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ghostreport}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: false
      path: /h2-console

server:
  error:
    include-stacktrace: never

ghostreport:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-this-secret-32-chars}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}


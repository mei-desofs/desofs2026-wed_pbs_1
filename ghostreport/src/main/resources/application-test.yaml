spring:
  datasource:
    url: jdbc:h2:mem:ghostreport-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  error:
    include-stacktrace: never

app:
  upload-dir: target/test-uploads/default

ghostreport:
  backup-dir: target/test-backups/default
  backup-enabled: true

<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostReport - Painel Analista</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topnav">
    <a class="brand" href="/index.html">GhostReport</a>
    <a href="/submit.html">Submeter denúncia</a>
    <a href="/track.html">Acompanhar denúncia</a>
    <a href="/analyst.html">Painel Analista</a>
    <a href="/admin.html">Painel Admin</a>
</div>

<div class="container">
    <h1>Painel do Analista</h1>

    <div id="loginSection">
        <label>Utilizador</label>
        <input id="username" type="text">

        <label>Password</label>
        <input id="password" type="password">

        <button onclick="login()">Entrar</button>

        <div id="loginError" class="error"></div>
    </div>

    <div id="analystPanel" style="display:none;">
        <h2>Os meus casos</h2>
        <div id="cases"></div>
    </div>
</div>

<script src="/js/api.js"></script>

<script>
    let analystAuth = null;

    function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("loginError");

        analystAuth = basicAuthHeader(username, password);

        fetch(`${API_BASE}/analyst/my-cases`, {
            method: "GET",
            headers: {
                "Authorization": analystAuth
            }
        })
            .then(res => {
                if (!res.ok) throw new Error("Login inválido");
                return res.json();
            })
            .then(() => {
                // esconder login
                document.getElementById("loginSection").style.display = "none";

                // mostrar painel
                document.getElementById("analystPanel").style.display = "block";

                loadCases();
            })
            .catch(err => {
                errorDiv.innerText = err.message;
            });
    }

    function loadCases() {
        fetch(`${API_BASE}/analyst/my-cases`, {
            headers: {
                "Authorization": analystAuth
            }
        })
            .then(res => res.json())
            .then(data => {
                const casesDiv = document.getElementById("cases");

                if (!data.length) {
                    casesDiv.innerHTML = "Não tens casos atribuídos.";
                    return;
                }

                casesDiv.innerHTML = data.map(c => `
                <div class="card">
                    <strong>Report ID:</strong> ${c.reportId}<br>
                    <strong>CaseReview ID:</strong> ${c.caseReviewId}<br>
                    <strong>Analista:</strong> ${c.assignedAnalystUsername}<br>
                    <strong>Prioridade:</strong> ${c.priority}<br>
                    <strong>Notas:</strong> ${c.notes || "-"}<br>
                    <strong>Estado:</strong> ${c.reportStatus}
                </div>
            `).join("");
            });
    }
</script>

</body>
</html>

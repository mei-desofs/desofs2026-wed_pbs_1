<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>GhostReport - Submeter Denúncia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topnav">
    <a class="brand" href="/index.html">GhostReport</a>
    <a href="/submit.html">Submeter denúncia</a>
    <a href="/track.html">Acompanhar denúncia</a>
    <a href="/analyst.html">Painel Analista</a>
    <a href="/admin.html">Painel Admin</a>
</div>

<div class="container">
    <h1>Submeter Denúncia</h1>

    <form id="reportForm">

        <label for="title">Título da denúncia</label>
        <input id="title" type="text" required>

        <label for="category">Categoria</label>
        <select id="category" required>
            <option value="">Selecionar categoria</option>
            <option value="Fraude">Fraude</option>
            <option value="Corrupção">Corrupção</option>
            <option value="Assédio">Assédio</option>
            <option value="Segurança">Segurança</option>
            <option value="Outros">Outros</option>
        </select>

        <label for="description">Descrição</label>
        <textarea id="description" rows="5" required></textarea>

        <label for="files">Anexos</label>
        <input id="files" type="file" multiple>

        <button type="submit">Submeter denúncia</button>
    </form>

    <div id="result"></div>
</div>

<script src="/js/api.js"></script>
<script>
    document.getElementById("reportForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const title = document.getElementById("title").value;
        const description = document.getElementById("description").value;
        const category = document.getElementById("category").value;
        const files = document.getElementById("files").files;

        const resultDiv = document.getElementById("result");

        try {

            const response = await fetch(`${API_BASE}/reports`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    title,
                    description,
                    category
                })
            });

            const data = await handleJsonResponse(response);

            if (files.length > 0) {

                for (let i = 0; i < files.length; i++) {
                    const formData = new FormData();
                    formData.append("files", files[i]);

                    const uploadResponse = await fetch(`${API_BASE}/reports/${data.id}/attachments`, {
                        method: "POST",
                        body: formData
                    });

                    if (!uploadResponse.ok) {
                        const errorText = await uploadResponse.text();
                        console.error("Upload failed:", uploadResponse.status, errorText);
                        throw new Error(`Erro ao guardar anexos: ${uploadResponse.status} - ${errorText}`);
                    }
                }
            }

            resultDiv.innerHTML = `
            <div class="result">
                <strong>Denúncia criada com sucesso.</strong><br>
                Código: <strong>${data.trackingCode}</strong><br><br>
                A redirecionar...
            </div>
        `;

            setTimeout(() => {
                window.location.href = `/track.html?code=${data.trackingCode}&id=${data.id}`;
            }, 1500);

        } catch (error) {
            resultDiv.innerHTML = `<div class="error">${error.message}</div>`;
        }
    });
</script>

</body>
</html>

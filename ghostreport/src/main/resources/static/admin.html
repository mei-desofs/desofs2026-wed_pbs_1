<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>GhostReport - Painel Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topnav">
    <a href="/index.html">Submeter denúncia</a>
    <a href="/track.html">Acompanhar denúncia</a>
    <a href="/analyst.html">Painel Analista</a>
    <a href="/admin.html">Painel Admin</a>
</div>

<div class="container">
    <h1>Painel do Admin</h1>

    <!-- LOGIN -->
    <div id="loginSection">
        <label>Utilizador</label>
        <input id="username" type="text">

        <label>Password</label>
        <input id="password" type="password">

        <button onclick="login()">Entrar</button>

        <div id="loginError" class="error"></div>
    </div>

    <!-- PAINEL ADMIN -->
    <div id="adminPanel" style="display:none;">

        <h2>Utilizadores</h2>
        <button onclick="loadUsers()">Listar utilizadores</button>
        <div id="users"></div>

        <hr>

        <h2>Criar utilizador</h2>

        <input id="newUsername" placeholder="Username">
        <input id="newEmail" placeholder="Email">
        <input id="newPassword" placeholder="Password">

        <select id="newRole">
            <option value="ANALYST">ANALYST</option>
            <option value="ADMIN">ADMIN</option>
        </select>

        <button onclick="createUser()">Criar utilizador</button>

        <div id="createUserResult"></div>
    </div>
</div>

<script src="/js/api.js"></script>

</body>
</html>

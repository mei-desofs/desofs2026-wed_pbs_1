<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>GhostReport - Acompanhar Denúncia</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topnav">
    <a href="/index.html">Submeter denúncia</a>
    <a href="/track.html">Acompanhar denúncia</a>
    <a href="/analyst.html">Painel Analista</a>
    <a href="/admin.html">Painel Admin</a>
</div>

<div class="container">
    <h1>Acompanhar Denúncia</h1>

    <form id="verifyForm">
        <label for="trackingCode">Código de acompanhamento</label>
        <input id="trackingCode" type="text" required>
        <button type="submit">Consultar</button>
    </form>

    <div id="result"></div>
</div>

<script src="/js/api.js"></script>
<script>

    // 🔹 Preenche automaticamente se vier do index.html
    const params = new URLSearchParams(window.location.search);
    document.getElementById("trackingCode").value = params.get("code") || "";

    // 🔹 CONSULTAR DENÚNCIA
    document.getElementById("verifyForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const trackingCode = document.getElementById("trackingCode").value;
        const resultDiv = document.getElementById("result");

        try {
            const response = await fetch(`${API_BASE}/reports/verify`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ trackingCode })
            });

            const data = await handleJsonResponse(response);

            // 🔥 Card com anexo integrado (SEM ID visível)
            resultDiv.innerHTML = `
            <div class="result">
                <strong>Denúncia encontrada</strong><br><br>

                <b>Categoria:</b> ${data.category}<br>
                <b>Estado:</b> ${data.status}<br>
                <b>Descrição:</b> ${data.description}

                <hr>

                <h3>Anexar ficheiro a esta denúncia</h3>

                <form id="attachmentForm">
                    <input type="file" id="file" required>
                    <button type="submit">Enviar anexo</button>
                </form>

                <div id="attachmentResult"></div>
            </div>
        `;

            // 🔥 Evento do upload (usa ID internamente)
            document.getElementById("attachmentForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                const fileInput = document.getElementById("file");
                const attachmentResult = document.getElementById("attachmentResult");

                const formData = new FormData();
                formData.append("file", fileInput.files[0]);

                try {
                    const response = await fetch(`${API_BASE}/reports/${data.id}/attachments`, {
                        method: "POST",
                        body: formData
                    });

                    const attachData = await handleJsonResponse(response);

                    attachmentResult.innerHTML = `
                    <div class="result">
                        ✔ Anexo enviado com sucesso<br>
                        Nome: ${attachData.originalName}
                    </div>
                `;
                } catch (error) {
                    attachmentResult.innerHTML = `<div class="error">${error.message}</div>`;
                }
            });

        } catch (error) {
            resultDiv.innerHTML = `<div class="error">${error.message}</div>`;
        }
    });
</script>
</body>
</html>

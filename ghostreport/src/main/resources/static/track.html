<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>GhostReport - Acompanhar Denúncia</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topnav">
    <a href="/index.html">Submeter denúncia</a>
    <a href="/track.html">Acompanhar denúncia</a>
    <a href="/analyst.html">Painel Analista</a>
    <a href="/admin.html">Painel Admin</a>
</div>

<div class="container">
    <h1>Acompanhar Denúncia</h1>

    <form id="verifyForm">
        <label for="trackingCode">Código de acompanhamento</label>
        <input id="trackingCode" type="text" required>
        <button type="submit">Consultar</button>
    </form>

    <div id="result"></div>
</div>

<script src="/js/api.js"></script>
<script>

    const params = new URLSearchParams(window.location.search);
    document.getElementById("trackingCode").value = params.get("code") || "";

    document.getElementById("verifyForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const trackingCode = document.getElementById("trackingCode").value;
        const resultDiv = document.getElementById("result");

        try {
            const response = await fetch(`${API_BASE}/reports/verify`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ trackingCode })
            });

            const data = await handleJsonResponse(response);

            resultDiv.innerHTML = `
            <div class="result">
                <strong>Denúncia encontrada</strong><br><br>

                <b>Categoria:</b> ${data.category}<br>
                <b>Estado:</b> ${data.status}<br>
                <b>Descrição:</b> ${data.description}

                <hr>

                <h3>Anexos</h3>
                <div id="attachmentsList">A carregar...</div>

                <hr>

                <h3>Adicionar anexos</h3>

                <form id="attachmentForm">
                    <input type="file" id="file" multiple required>
                    <button type="submit">Enviar anexos</button>
                </form>

                <div id="attachmentResult"></div>
            </div>
        `;

            loadAttachments(data.id);

            document.getElementById("attachmentForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                const files = document.getElementById("file").files;
                const result = document.getElementById("attachmentResult");

                result.innerHTML = "A enviar...";

                for (let i = 0; i < files.length; i++) {

                    const formData = new FormData();
                    formData.append("file", files[i]);

                    try {
                        await fetch(`${API_BASE}/reports/${data.id}/attachments`, {
                            method: "POST",
                            body: formData
                        });
                    } catch (err) {
                        result.innerHTML = `<div class="error">${err.message}</div>`;
                        return;
                    }
                }

                result.innerHTML = `<div class="result">✔ Anexos enviados com sucesso</div>`;

                loadAttachments(data.id);
            });

        } catch (error) {
            resultDiv.innerHTML = `<div class="error">${error.message}</div>`;
        }
    });

    async function loadAttachments(reportId) {

        const listDiv = document.getElementById("attachmentsList");

        try {
            const response = await fetch(`${API_BASE}/analyst/reports/${reportId}/attachments`, {
                headers: {
                    // ⚠️ se precisares de auth, mete aqui
                }
            });

            const data = await response.json();

            if (!data.length) {
                listDiv.innerHTML = "Sem anexos.";
                return;
            }

            listDiv.innerHTML = data.map(a => `
            <div class="card">
                📎 ${a.originalName}
                <br>
                <button onclick="downloadAttachment(${a.id})">
                    Download
                </button>
            </div>
        `).join("");

        } catch (err) {
            listDiv.innerHTML = "Erro ao carregar anexos";
        }
    }
    function downloadAttachment(id) {
        window.open(`${API_BASE}/analyst/attachments/${id}/download`, "_blank");
    }

</script>

</body>
</html>

name: CI Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ghostreport
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: user
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: ./ghostreport

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: ghostreport/pom.xml

      - name: Build project
        run: ./mvnw clean compile

      - name: Run tests
        run: ./mvnw test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/ghostreport
          DB_USERNAME: postgres
          DB_PASSWORD: user

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-test-reports
          path: ghostreport/target/surefire-reports/**
          if-no-files-found: warn

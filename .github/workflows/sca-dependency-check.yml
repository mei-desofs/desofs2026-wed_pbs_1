name: SCA Dependency-Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ghostreport

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: ghostreport/pom.xml

      # Sprint 1 evidence mode: the report is generated for manual triage.
      - name: Run OWASP Dependency-Check SCA
        run: ./mvnw org.owasp:dependency-check-maven:12.1.0:check -Dformat=ALL -DossindexAnalyzerEnabled=false -DfailOnError=false -DfailBuildOnCVSS=11
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency-Check HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-sca-html
          path: ghostreport/target/dependency-check-report/dependency-check-report.html
          if-no-files-found: warn

      - name: Upload Dependency-Check JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-sca-json
          path: ghostreport/target/dependency-check-report/dependency-check-report.json
          if-no-files-found: warn

      - name: Upload Dependency-Check XML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-sca-xml
          path: ghostreport/target/dependency-check-report/dependency-check-report.xml
          if-no-files-found: warn

      - name: Upload Dependency-Check SARIF report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-sca-sarif
          path: ghostreport/target/dependency-check-report/dependency-check-report.sarif
          if-no-files-found: warn

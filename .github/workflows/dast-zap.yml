name: DAST OWASP ZAP

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  zap-baseline:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ghostreport
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: user
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: ./ghostreport

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: ghostreport/pom.xml

      - name: Start GhostReport for DAST
        run: |
          mkdir -p target/zap-reports
          chmod 777 target/zap-reports
          nohup ./mvnw spring-boot:run \
            -Dspring-boot.run.profiles=dev \
            > target/ghostreport-dast-app.log 2>&1 &
          echo $! > target/ghostreport-dast-app.pid
        env:
          DB_URL: jdbc:postgresql://localhost:5432/ghostreport
          DB_USERNAME: postgres
          DB_PASSWORD: user

      - name: Wait for GhostReport
        run: |
          for i in {1..60}; do
            if curl --fail --silent --show-error http://localhost:8081/index.html > /dev/null; then
              echo "GhostReport is ready for DAST"
              exit 0
            fi
            sleep 2
          done

          echo "GhostReport did not become ready"
          cat target/ghostreport-dast-app.log
          exit 1

      - name: Run OWASP ZAP baseline DAST
        run: |
          docker run --rm --network host \
            --user root \
            -w /zap/wrk \
            -v "$PWD/target/zap-reports:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8081 \
              -r zap-baseline.html \
              -x zap-baseline.xml \
              -J zap-baseline.json \
              -I
        continue-on-error: true

      - name: List OWASP ZAP generated reports
        if: always()
        run: |
          echo "Generated ZAP report files:"
          find target/zap-reports -maxdepth 1 -type f -print -exec ls -lh {} \;

          if [ ! -f target/zap-reports/zap-baseline.html ] || \
             [ ! -f target/zap-reports/zap-baseline.xml ] || \
             [ ! -f target/zap-reports/zap-baseline.json ]; then
            echo "::warning::Expected ZAP HTML/XML/JSON reports were not all generated."
          fi

      - name: Upload OWASP ZAP HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-dast-html
          path: ghostreport/target/zap-reports/zap-baseline.html
          if-no-files-found: warn

      - name: Upload OWASP ZAP JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-dast-json
          path: ghostreport/target/zap-reports/zap-baseline.json
          if-no-files-found: warn

      - name: Upload OWASP ZAP XML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-dast-xml
          path: ghostreport/target/zap-reports/zap-baseline.xml
          if-no-files-found: warn

      - name: Upload DAST application log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ghostreport-dast-app-log
          path: ghostreport/target/ghostreport-dast-app.log
          if-no-files-found: warn

      - name: Stop GhostReport DAST app
        if: always()
        run: |
          if [ -f target/ghostreport-dast-app.pid ]; then
            kill "$(cat target/ghostreport-dast-app.pid)" || true
          fi

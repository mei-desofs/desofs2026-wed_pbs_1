name: SAST SpotBugs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  spotbugs:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ghostreport

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: ghostreport/pom.xml

      - name: Run SpotBugs SAST
        run: ./mvnw com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:spotbugs -Dspotbugs.xmlOutput=true

      - name: List SpotBugs generated reports
        if: always()
        run: |
          echo "Generated SpotBugs report files:"
          find target -maxdepth 3 -type f \( -iname "*spotbugs*" -o -iname "*findbugs*" \) -print -exec ls -lh {} \;

      - name: Upload SpotBugs SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-sast-report
          path: |
            ghostreport/target/spotbugsXml.xml
            ghostreport/target/*spotbugs*.xml
            ghostreport/target/site/spotbugs*
          if-no-files-found: warn

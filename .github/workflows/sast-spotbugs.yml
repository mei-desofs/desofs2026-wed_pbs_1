name: SAST SpotBugs

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  spotbugs:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ghostreport

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
          cache-dependency-path: ghostreport/pom.xml

      - name: Run SpotBugs SAST
        run: ./mvnw com.github.spotbugs:spotbugs-maven-plugin:4.8.6.6:spotbugs

      - name: Upload SpotBugs SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-sast-report
          path: |
            ghostreport/target/spotbugs*.xml
            ghostreport/target/site/spotbugs*
          if-no-files-found: warn
